apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-tracker-api
  labels:
    app: task-tracker-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-tracker-api
  template:
    metadata:
      labels:
        app: task-tracker-api
    spec:
      containers:
      - name: task-tracker-api
        image: task-tracker-api:stable
        imagePullPolicy: Never # Forces K3s to read the newly imported image from local containerd storage
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        # Database Connection String Setup
        - name: ConnectionStrings__taskDbConn
          value: "Server=192.168.1.16,31433;Database=TasksDB;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=True;"
        # CRITICAL KAFKA INNER ROUTING MAP
        - name: Kafka__BootstrapServers
          value: "kafka-service:9092"
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: task-tracker-api-service
  labels:
    app: task-tracker-api
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080 # Exposes Swagger to your browser
    protocol: TCP
  selector:
    app: task-tracker-api