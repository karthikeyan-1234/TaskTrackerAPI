apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  namespace: default
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:

    # ==========================================================
    # FIXED: Precise configuration for spanmetrics connector
    # ==========================================================
    connectors:
      spanmetrics:
        histogram:
          unit: "ms" # Explicitly sets the metric suffix to match standards
          explicit:
            buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 5s]
        dimensions:
          - name: http.request.method
          - name: http.response.status_code
          - name: http.route
        # Ensures resource tags (like service.name) are carried over into Prometheus
        resource_metrics_key_attributes:
          - service.name
          - deployment.environment

    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: "spanmetrics"
      otlp:
        endpoint: "jaeger:4317"
        tls:
          insecure: true
      debug:
        verbosity: detailed
      loki:
        endpoint: "http://loki:3100/loki/api/v1/push"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp, debug, spanmetrics] # Traces are exported into the connector
        metrics:
          receivers: [otlp, spanmetrics]        # Metrics are read out of the connector
          processors: [batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, loki]