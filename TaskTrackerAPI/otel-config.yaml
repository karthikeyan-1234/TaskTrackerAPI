apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  namespace: default
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:

    connectors:
      spanmetrics:
        histogram:
          unit: "ms"
          explicit:
            # FIX 1: Plain float milliseconds, NOT Go duration strings (5ms, 1s are invalid here)
            buckets: [5, 10, 25, 50, 100, 250, 500, 1000, 5000]
        dimensions:
          - name: http.request.method
          - name: http.response.status_code
          - name: http.route
        resource_metrics_key_attributes:
          - service.name
          - deployment.environment

    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        # FIX 2: Removed `namespace: "spanmetrics"` — it caused double-prefix:
        #         spanmetrics_spanmetrics_duration_ms_bucket (invisible in Prometheus)
        # FIX 3: enable_open_metrics is REQUIRED for exemplars to be scraped by Prometheus
        enable_open_metrics: true
      otlp:
        endpoint: "jaeger:4317"
        tls:
          insecure: true
      debug:
        verbosity: detailed
      loki:
        endpoint: "http://loki:3100/loki/api/v1/push"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp, debug, spanmetrics]
        metrics:
          receivers: [otlp, spanmetrics]
          processors: [batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, loki]