apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:3.4.2               # stable version
        args:
          - "-config.file=/etc/loki/local-config.yaml"
        ports:
          - containerPort: 3100
        volumeMounts:
        - name: loki-storage
          mountPath: /loki
      volumes:
      - name: loki-storage
        emptyDir: {}                            # replace with persistentVolumeClaim for persistence
        # persistentVolumeClaim:
        #   claimName: loki-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: loki
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100