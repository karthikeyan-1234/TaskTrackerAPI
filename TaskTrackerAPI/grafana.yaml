# ============================================================
# 1. Grafana Datasources — Prometheus, Jaeger, Loki
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: Prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        jsonData:
          exemplarTraceIdDestinations:
            - name: traceID
              datasourceUid: Jaeger
          httpMethod: POST

      - name: Jaeger
        type: jaeger
        uid: Jaeger
        url: http://jaeger:16686
        access: proxy

      - name: Loki
        type: loki
        uid: Loki
        url: http://loki:3100
        access: proxy
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '"TraceId"\s*:\s*"([a-f0-9]+)"'
              url: '$${__value.raw}'
              datasourceUid: Jaeger
---
# ============================================================
# 2. Grafana Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        env:
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: "Admin"
        - name: GF_FEATURE_TOGGLES_ENABLE
          value: "exemplarTraceIdDestinations"  # Enables diamond exemplar click-through to Jaeger
        volumeMounts:
        - name: datasources-vol
          mountPath: /etc/grafana/provisioning/datasources
      volumes:
      - name: datasources-vol
        configMap:
          name: grafana-datasources
---
# ============================================================
# 3. Grafana Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: default
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30091