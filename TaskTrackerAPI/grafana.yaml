{
  "title": "Throughput (with Live Jaeger Trace Diamond Exemplars)",
  "type": "timeseries",
  "datasource": { "type": "prometheus", "uid": "Prometheus" },
  "targets": [
    {
      "expr": "sum(rate(spanmetrics_duration_ms_count{job=\"otel-collector\"}[1m]))",
      "legendFormat": "API Throughput",
      "refId": "A"
    }
  ],
  "options": {
    "exemplars": {
      "color": "rgba(0, 211, 255, 1)",
      "enable": true
    }
  },
  "fieldConfig": {
    "defaults": {
      "unit": "reqps",
      "custom": {
        "lineWidth": 2,
        "fillOpacity": 12,
        "drawStyle": "line"
      }
    }
  }
}