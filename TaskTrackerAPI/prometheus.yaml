apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:

      # OpenTelemetry Collector Metrics
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8889']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1

          args:
            - "--config.file=/etc/prometheus/prometheus.yml"

            # REQUIRED FOR EXEMPLARS
            - "--enable-feature=exemplar-storage"

            # Optional but useful
            - "--storage.tsdb.retention.time=7d"

          ports:
            - containerPort: 9090

          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus

      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: default

spec:
  type: NodePort

  selector:
    app: prometheus

  ports:
    - name: web
      port: 9090
      targetPort: 9090
      nodePort: 30090